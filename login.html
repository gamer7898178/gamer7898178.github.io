<!doctype html>
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login — Potato Downloads</title><link rel="stylesheet" href="style.css"></head>
<body class="steam-ui">
  <header class="topbar"><div class="left"><a href="index.html" class="back">← Store</a><img src="logo.svg" class="logo"><div class="brand">Login</div></div></header>
  <main class="container"><div class="card" style="max-width:520px;margin:32px auto">
    <h2>Log in / Sign up</h2>
    <form id="loginFormFull">
      <label>Display name <input id="displayNameFull" required></label>
      <label>Email <input id="emailFull" type="email" required></label>
      <label>Password <input id="passwordFull" type="password" required></label>
      <div class="row">
        <button id="doSignupFull" class="btn" type="button">Sign up</button>
        <button id="doLoginFull" class="btn" type="button">Log in</button>
      </div>
    </form>
  </div></main>
<script type="module" src="app.firebase-ui.js"></script>
</body></html>
